services:
  postgres:
    image: postgres:16
    container_name: banamalati-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: banamalati_infra
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  mysql:
    image: mysql:8.4
    container_name: banamalati-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: banamalati_infra
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  postgres-data:
  mysql-data:
